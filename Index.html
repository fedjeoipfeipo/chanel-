<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanel Logo - Turtle Translation</title>
    <style>
        /* Centers the entire canvas on the screen, matching the canvas feel */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The SVG acts as the turtle canvas */
        .turtle-canvas {
            width: 400px;
            height: 250px;
        }

        /* Font style translation from lines 34-35: c.write("CHANEL", font=("arial", "50")) */
        .chanel-text {
            font-family: 'Arial', sans-serif;
            font-size: 55px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #000000;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <svg class="turtle-canvas" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
            <path d="M 175 40 A 65 65 0 1 0 175 180" 
                  fill="none" 
                  stroke="black" 
                  stroke-width="30" 
                  stroke-linecap="square"/>
            
            <path d="M 225 40 A 65 65 0 1 1 225 180" 
                  fill="none" 
                  stroke="black" 
                  stroke-width="30" 
                  stroke-linecap="square"/>
            
            <path d="M 140 46 A 65 65 0 0 1 175 40" 
                  fill="none" 
                  stroke="black" 
                  stroke-width="30" 
                  stroke-linecap="square"/>
        </svg>

        <div class="chanel-text">CHANEL</div>
    </div>

</body>
</html>
